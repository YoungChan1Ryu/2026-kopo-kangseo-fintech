<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카드뉴스</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #333;
        }

        header {
            background: #333;
            color: #fff;
            padding: 1rem;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 15px;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* 카드뉴스 슬라이더 레이아웃 */
        .slider-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 2rem;
            gap: 20px;
        }

        .slider-container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            position: relative;
        }

        /* 갤러리 아이템 구조 정의 */
        .gallery-item {
            display: none;
            width: 100%;
        }

        .gallery-item.active {
            display: block;
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        /* 조작 버튼 인터페이스 */
        .nav-btn {
            background: #007bff;
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            flex-shrink: 0;
        }

        .nav-btn:hover {
            background: #0056b3;
        }

        .nav-btn:active {
            transform: scale(0.95);
        }

        .nav-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* 하단 인디케이터 */
        .page-indicator {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 1.1rem;
            font-weight: bold;
            color: #4a5568;
        }

        /* 🛠️ 모바일 상단바 및 버튼 밀림 최적화 미디어 쿼리 */
        @media (max-width: 650px) {
            header {
                padding: 0.8rem 0.5rem;
            }

            nav {
                flex-direction: column;
                gap: 0.6rem;
                text-align: center;
            }

            nav h2 {
                font-size: 1.2rem;
            }

            nav a {
                margin: 0 8px;
                font-size: 0.95rem;
            }

            .container {
                margin: 1rem auto;
            }

            /* 모바일 화면에서는 화살표 크기를 살짝 조절하여 내부 공간 확보 */
            .slider-wrapper {
                gap: 8px;
            }

            .nav-btn {
                width: 38px;
                height: 38px;
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <h2><a href="index.html" style="color:white; text-decoration: none;">2026년도 2기 홍보 서포터즈</a></h2>
            <div>
                <a href="index.html">홈</a>
                <a href="video.html">동영상</a>
                <a href="cardnews.html" style="color:#007bff;">카드뉴스</a>
                <a href="blog.html">블로그</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <h2>📸 스마트금융과 카드뉴스</h2>

        <div class="slider-wrapper">
            <button class="nav-btn" id="prevBtn" onclick="moveSlide(-1)">&lt;</button>

            <div class="slider-container">
                <div class="gallery-item active"><img src="images/1.png" alt="카드뉴스 1"></div>
                <div class="gallery-item"><img src="images/2.png" alt="카드뉴스 2"></div>
                <div class="gallery-item"><img src="images/3.png" alt="카드뉴스 3"></div>
                <div class="gallery-item"><img src="images/4.png" alt="카드뉴스 4"></div>
                <div class="gallery-item"><img src="images/5.png" alt="카드뉴스 5"></div>
                <div class="gallery-item"><img src="images/6.png" alt="카드뉴스 6"></div>
            </div>

            <button class="nav-btn" id="nextBtn" onclick="moveSlide(1)">&gt;</button>
        </div>

        <div class="page-indicator" id="pageIndicator">1 / 6</div>
    </main>

    <script>
        let currentIdx = 0;
        const slides = document.querySelectorAll('.gallery-item');
        const totalSlides = slides.length;

        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageIndicator = document.getElementById('pageIndicator');

        function updateSlider() {
            slides.forEach(slide => slide.classList.remove('active'));
            slides[currentIdx].classList.add('active');
            pageIndicator.innerText = `${currentIdx + 1} / ${totalSlides}`;
            prevBtn.disabled = (currentIdx === 0);
            nextBtn.disabled = (currentIdx === totalSlides - 1);
        }

        function moveSlide(direction) {
            let nextIdx = currentIdx + direction;
            if (nextIdx >= 0 && nextIdx < totalSlides) {
                currentIdx = nextIdx;
                updateSlider();
            }
        }

        updateSlider();
    </script>
</body>

</html>
