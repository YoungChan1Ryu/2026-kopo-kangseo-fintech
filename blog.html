<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>블로그</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #f5f7fa; color: #333; }
        header { background: #333; color: #fff; padding: 1rem; }
        nav { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        nav a { color: #fff; text-decoration: none; margin-left: 15px; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        
        /* 블로그 레이아웃 */
        .post { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        .post-meta { color: #888; font-size: 0.85rem; margin-bottom: 0.5rem; }
        .post h3 { margin-bottom: 1rem; color: #222; }
        .post p { margin-bottom: 1.5rem; font-size: 1rem; color: #444; }
        .like-btn { background: #fee2e2; color: #ef4444; border: none; padding: 0.4rem 0.8rem; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .like-btn:hover { background: #fca5a5; }
    </style>
</head>
<body>
    <header>
        <nav>
            <h2><a href="index.html" style="color:white;">MyWeb</a></h2>
            <div>
                <a href="index.html">홈</a>
                <a href="video.html">동영상</a>
                <a href="cardnews.html">카드뉴스</a>
                <a href="blog.html" style="color:#007bff;">블로그</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <h2>✍️ 스마트금융과 블로그</h2>
        <br>
        
        <article class="post">
            <div class="post-meta">작성일: 2026-06-08 | 카테고리: 일상</div>
            <h3>첫 번째 블로그 글 제목입니다.</h3>
            <p>여기에 본문 내용을 자유롭게 작성하시면 됩니다. 이 웹사이트는 가볍고 빠른 HTML/CSS/JS 기반으로 빌드되어 무료 호스팅 서비스 환경에서 아주 쾌적하게 작동합니다.</p>
        </article>

        
    </main>

    <script>
        function increaseLike(button) {
            const countSpan = button.querySelector('span');
            let currentCount = parseInt(countSpan.innerText);
            countSpan.innerText = currentCount + 1;
        }
    </script>
</body>
</html>
