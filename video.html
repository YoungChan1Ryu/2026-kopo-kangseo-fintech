<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>스마트금융과 동영상</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #333;
        }

        header {
            background: #333;
            color: #fff;
            padding: 1rem;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 15px;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* 반응형 비디오 그리드 */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .video-card {
            background: white;
            padding: 1rem;
            border-radius: 6px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            border-radius: 4px;
        }

        .video-card h3 {
            margin-top: 0.8rem;
            font-size: 1.1rem;
        }

        /* 🛠️ 모바일 상단바 최적화 미디어 쿼리 */
        @media (max-width: 650px) {
            header {
                padding: 0.8rem 0.5rem;
            }

            nav {
                flex-direction: column;
                gap: 0.6rem;
                text-align: center;
            }

            nav h2 {
                font-size: 1.2rem;
            }

            nav a {
                margin: 0 8px;
                font-size: 0.95rem;
            }

            .container {
                margin: 1rem auto;
            }

            .video-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <h2><a href="index.html" style="color:white; text-decoration: none;">2026년도 2기 홍보 서포터즈</a></h2>
            <div>
                <a href="index.html">홈</a>
                <a href="video.html" style="color:#007bff;">동영상</a>
                <a href="cardnews.html">카드뉴스</a>
                <a href="blog.html">블로그</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <h2>🎬 스마트금융과 동영상</h2>
        <div class="video-grid">
            <div class="video-card">
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/774AvAe1TUc" referrerpolicy="strict-origin"
                        allowfullscreen></iframe>
                </div>
                <h3>2026년도 스마트금융과 온라인 설명회</h3>
            </div>
            <div class="video-card">
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/S74KAsLg34U" referrerpolicy="strict-origin"
                        allowfullscreen></iframe>
                </div>
                <h3>학과 실습실 탐방 및 졸업생 인터뷰</h3>
            </div>
        </div>
    </main>
</body>

</html>
